## Flow — IoT Alert Detail Actions
## Tests: abrir alerta IoT → ver chart → criar OS a partir do alerta
## Tags: regression, iot
appId: net.globalthings.gtone
tags:
  - regression
  - iot
env:
  EMAIL: ${MAESTRO_TEST_EMAIL}
  PASSWORD: ${MAESTRO_TEST_PASSWORD}
---
- runFlow: ../01_auth/login_happy.yaml

- tapOn:
    id: "btn-notifications-bell"

- tapOn:
    id: "iot-alert-notif"
    index: 0

- extendedWaitUntil:
    visible: "Alerta|Alert"
    timeout: 10000
- assertVisible:
    id: "alert-chart"

- tapOn:
    id: "btn-create-wo-from-alert"

- extendedWaitUntil:
    visible:
      id: "input-wo-title"
    timeout: 10000

- assertVisible: ".*sensor.*|.*alerta.*"
