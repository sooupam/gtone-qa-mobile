## Flow — Edge: Network Flapping
## Tests: alternar net on/off 5x → sync resiliente
## Tags: slow, edge, sync
appId: net.globalthings.gtone
tags:
  - slow
  - edge
  - sync
env:
  EMAIL: ${MAESTRO_TEST_EMAIL}
  PASSWORD: ${MAESTRO_TEST_PASSWORD}
---
- runFlow: ../01_auth/login_happy.yaml

- repeat:
    times: 5
    commands:
      - runScript: ../../scripts/wifi_off.sh
      - tapOn:
          text: "OS"
      - runScript: ../../scripts/wifi_on.sh
      - tapOn:
          text: "Home"

- extendedWaitUntil:
    visible: "Modo direto"
    timeout: 30000

- assertNotVisible: "Erro|Error|crashed"
