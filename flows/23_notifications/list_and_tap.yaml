## Flow — Notifications List and Tap
## Tests: abrir notificacoes → tap em uma → navegacao correta
## Tags: regression, notifications
appId: net.globalthings.gtone
tags:
  - regression
  - notifications
env:
  EMAIL: ${MAESTRO_TEST_EMAIL}
  PASSWORD: ${MAESTRO_TEST_PASSWORD}
---
- runFlow: ../01_auth/login_happy.yaml

- tapOn:
    id: "btn-notifications-bell"

- extendedWaitUntil:
    visible: "Notificacoes|Notifications"
    timeout: 10000

- tapOn:
    id: "notification-item"
    index: 0

- extendedWaitUntil:
    visible: "wo-detail-header|sr-detail-header|asset-detail-header"
    timeout: 10000
