## Flow 10 — Asset Search (List/Search)
## Tests: Cadastros → Ativos → list renders
## Tags: regression
appId: net.globalthings.gtone
tags:
  - regression
env:
  EMAIL: ${MAESTRO_TEST_EMAIL}
  PASSWORD: ${MAESTRO_TEST_PASSWORD}
---
- runFlow: ../01_auth/login_happy.yaml

- tapOn:
    text: "Cadastros"
- tapOn:
    text: "Ativos"

- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: ".*"
