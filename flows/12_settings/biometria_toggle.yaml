## Flow — Settings Biometria Toggle
## Tests: ativar biometria via settings → exigir biometria no proximo login
## Tags: regression, settings, auth
##
## NOTA: emulador sem hardware biometrico — flow valida toggle UI.
## Em device fisico, prompt de biometria aparece e pode ser dismissed com "Skip".
appId: net.globalthings.gtone
tags:
  - regression
  - settings
  - auth
env:
  EMAIL: ${MAESTRO_TEST_EMAIL}
  PASSWORD: ${MAESTRO_TEST_PASSWORD}
---
- runFlow: ../01_auth/login_happy.yaml

- tapOn:
    text: "Mais"
- tapOn:
    text: "Configuracoes"

- tapOn:
    id: "switch-biometria"

- assertVisible: "Biometria ativada|Enabled"

- tapOn:
    id: "btn-logout"
- tapOn:
    id: "btn-logout-confirm"
    optional: true

- extendedWaitUntil:
    visible:
      id: "input-email"
    timeout: 15000

- tapOn:
    id: "input-email"
- inputText: ${EMAIL}
- tapOn:
    id: "input-password"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: "btn-login"

- extendedWaitUntil:
    visible: "Biometria|Confirmar identidade|Configurar depois"
    timeout: 15000

- tapOn:
    text: "Configurar depois|Skip"
    optional: true
