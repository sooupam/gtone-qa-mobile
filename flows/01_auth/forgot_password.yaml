## Flow — Auth Forgot Password
## Tests: pedir reset → modal "Email enviado"
## Tags: critical, auth
appId: net.globalthings.gtone
tags:
  - critical
  - auth
env:
  EMAIL: ${MAESTRO_TEST_EMAIL}
---
- launchApp:
    clearState: true
- tapOn:
    text: "Pular"
    optional: true
- extendedWaitUntil:
    visible:
      id: "input-email"
    timeout: 30000
- tapOn:
    id: "input-email"
- inputText: ${EMAIL}
- hideKeyboard
- tapOn:
    text: "Esqueci minha senha"
- extendedWaitUntil:
    visible: "Email enviado"
    timeout: 15000
- assertVisible: ".*Verifique seu email.*"
- tapOn:
    text: "OK"
- assertVisible:
    id: "input-email"
