## Flow — MFA TOTP Happy Path
## Tests: login com user MFA → digitar codigo correto → entrar
## Tags: regression, auth, mfa
##
## Requer env extra:
##   MAESTRO_MFA_EMAIL
##   MAESTRO_MFA_PASSWORD
##   MAESTRO_MFA_SECRET — seed TOTP base32 do user de teste MFA
appId: net.globalthings.gtone
tags:
  - regression
  - auth
  - mfa
env:
  EMAIL_MFA: ${MAESTRO_MFA_EMAIL}
  PASSWORD_MFA: ${MAESTRO_MFA_PASSWORD}
  TOTP_SECRET: ${MAESTRO_MFA_SECRET}
---
- launchApp:
    clearState: true
- tapOn:
    text: "Pular"
    optional: true

- tapOn:
    id: "input-email"
- inputText: ${EMAIL_MFA}
- tapOn:
    id: "input-password"
- inputText: ${PASSWORD_MFA}
- hideKeyboard
- tapOn:
    id: "btn-login"

- extendedWaitUntil:
    visible: "MFA|Codigo de verificacao"
    timeout: 15000

## Gera TOTP runtime via evalScript (assume modulo totp exposto)
- evalScript:
    script: |
      output.totp = require('totp').generate(env.TOTP_SECRET)

- tapOn:
    id: "input-mfa-code"
- inputText: ${output.totp}
- hideKeyboard
- tapOn:
    id: "btn-mfa-verify"

- extendedWaitUntil:
    visible: "Home|Demo Company|Inicio|OS"
    timeout: 15000
