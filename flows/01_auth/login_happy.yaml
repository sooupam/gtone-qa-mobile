## Flow 01 — Auth Login Happy Path
## Tests: login → tenant/company auto-skip → biometria dismiss → Home
## Tags: smoke, critical
appId: net.globalthings.gtone
tags:
  - smoke
  - critical
env:
  EMAIL: ${MAESTRO_TEST_EMAIL}
  PASSWORD: ${MAESTRO_TEST_PASSWORD}
---
## Clear app state to force onboarding + login every run (deterministic for E2E)
- launchApp:
    clearState: true

## Wait for onboarding "Pular" — optional (pode pular direto pro login)
- tapOn:
    text: "Pular"
    optional: true

## Wait for login screen
- extendedWaitUntil:
    visible:
      id: "input-email"
    timeout: 30000
- tapOn:
    id: "input-email"
- inputText: ${EMAIL}
- tapOn:
    id: "input-password"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: "btn-login"

## Post-login: auth + PowerSync sync takes ~10-15s
- extendedWaitUntil:
    visible:
      text: "Configurar depois|Selecione o ambiente|OS"
    timeout: 25000

## Tenant picker — opcional
- tapOn:
    text: "Rededor Demo|Demo Company"
    optional: true

## Biometria setup — opcional
- tapOn:
    text: "Configurar depois"
    optional: true

## Wait for Home
- extendedWaitUntil:
    visible:
      text: "OS"
    timeout: 30000
