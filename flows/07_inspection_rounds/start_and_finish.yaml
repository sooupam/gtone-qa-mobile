## Flow — Inspection Round Start and Finish
## Tests: iniciar ronda → percorrer pontos → fechar com observacao
## Tags: regression, inspection
appId: net.globalthings.gtone
tags:
  - regression
  - inspection
env:
  EMAIL: ${MAESTRO_TEST_EMAIL}
  PASSWORD: ${MAESTRO_TEST_PASSWORD}
---
- runFlow: ../01_auth/login_happy.yaml

- tapOn:
    text: "Mais"
- tapOn:
    text: "Rondas|Inspection Rounds"

- tapOn:
    id: "round-card"
    index: 0

- tapOn:
    id: "btn-round-start"
- assertVisible: "Em andamento"

- tapOn:
    id: "round-point"
    index: 0
- tapOn:
    text: "OK|Verificado"
- back

- tapOn:
    id: "round-point"
    index: 1
- tapOn:
    text: "OK|Verificado"
- back

- tapOn:
    id: "btn-round-finish"
- tapOn:
    id: "input-round-notes"
- inputText: "Ronda concluida via E2E"
- hideKeyboard
- tapOn:
    id: "btn-confirm"

- extendedWaitUntil:
    visible: "Concluida"
    timeout: 10000
