## Flow — Offline Create WO then Sync
## Tests: desligar net → criar OS → religar → sync OK
## Tags: regression, offline, sync
##
## Requer scripts/wifi_off.sh e wifi_on.sh (via adb shell svc wifi).
appId: net.globalthings.gtone
tags:
  - regression
  - offline
  - sync
env:
  EMAIL: ${MAESTRO_TEST_EMAIL}
  PASSWORD: ${MAESTRO_TEST_PASSWORD}
  WO_TITLE: "OS offline E2E"
---
- runFlow: ../01_auth/login_happy.yaml

## Aguarda PowerSync conectar
- extendedWaitUntil:
    visible: "Modo direto"
    timeout: 30000

## Desliga net via shell
- runScript: ../../scripts/wifi_off.sh

- tapOn:
    text: "OS"
- assertVisible: "Modo offline|Sem conexao"

- tapOn:
    id: "fab-create-wo"
- tapOn:
    id: "input-wo-title"
- inputText: ${WO_TITLE}
- hideKeyboard
- tapOn:
    id: "btn-save-wo"

- extendedWaitUntil:
    visible: "criada|pendente sync"
    timeout: 10000

- runScript: ../../scripts/wifi_on.sh

- extendedWaitUntil:
    visible: "Sincronizando|Modo direto"
    timeout: 30000

- tapOn:
    text: "OS"
- assertVisible: ${WO_TITLE}
