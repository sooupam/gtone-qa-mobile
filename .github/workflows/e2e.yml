name: E2E (Maestro)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a rodar (smoke | critical | regression). Vazio = tudo."
        required: false
        default: "critical"

env:
  MAESTRO_VERSION: 2.3.0

jobs:
  e2e-android:
    name: E2E Android API ${{ matrix.api-level }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        api-level: [31]
        target: [google_apis]
        arch: [x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM (nested virtualization)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Download GT ONE APK
        ## NOTA: ajustar pra baixar APK gerado em outro pipeline ou EAS.
        ## Por enquanto, esperar artefato no repo principal.
        run: |
          mkdir -p artifacts
          ## Placeholder — baixar APK de release storage ou eas build
          echo "TODO: substituir por download real do APK"
          ## curl -L "$APK_URL" -o artifacts/app-debug.apk

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell input keyevent 82

            ## Port forward (caso backend rode externo, ajustar)
            adb reverse tcp:8081 tcp:8081 || true
            adb reverse tcp:54321 tcp:54321 || true

            ## Install APK
            if [ -f artifacts/app-debug.apk ]; then
              adb install artifacts/app-debug.apk
            else
              echo "ERRO: artifacts/app-debug.apk não encontrado — etapa anterior precisa ser configurada."
              exit 1
            fi

            ## Env vars
            export MAESTRO_TEST_EMAIL="${{ secrets.MAESTRO_TEST_EMAIL }}"
            export MAESTRO_TEST_PASSWORD="${{ secrets.MAESTRO_TEST_PASSWORD }}"
            export MAESTRO_TEST_TENANT_SLUG="${{ vars.MAESTRO_TEST_TENANT_SLUG }}"
            export MAESTRO_TEST_COMPANY_ID="${{ vars.MAESTRO_TEST_COMPANY_ID }}"

            ## Run flows
            mkdir -p reports
            TAG="${{ github.event.inputs.tag || 'critical' }}"
            if [ -n "$TAG" ]; then
              maestro test --include-tags="$TAG" --format=junit --output=reports/junit.xml flows/
            else
              maestro test --format=junit --output=reports/junit.xml flows/
            fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-reports-api${{ matrix.api-level }}
          path: |
            reports/
            ~/.maestro/tests/**/screenshot-*.png
          retention-days: 14
