name: E2E (Maestro)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * *"   # nightly regression
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (smoke | critical | regression). Vazio = critical."
        required: false
        default: "critical"

env:
  MAESTRO_VERSION: 2.3.0

jobs:
  e2e-android:
    name: E2E Android API ${{ matrix.api-level }} — tag ${{ matrix.tag }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        api-level: [31]
        target: [google_apis]
        arch: [x86_64]
        ## Em PR roda smoke+critical; nightly roda regression
        tag:
          - ${{ github.event_name == 'schedule' && 'regression' || 'critical' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM (nested virtualization)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Download APK
        run: |
          mkdir -p artifacts
          ## TODO: substituir por download real do APK (EAS / cross-repo artifact / S3).
          echo "TODO: APK download. Ver issue #18 (area/infra)."

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell input keyevent 82

            adb reverse tcp:8081 tcp:8081 || true
            adb reverse tcp:54321 tcp:54321 || true

            if [ -f artifacts/app-debug.apk ]; then
              adb install artifacts/app-debug.apk
            else
              echo "ERRO: APK ausente — ver TODO em jobs.Download APK."
              exit 1
            fi

            ## Env vars das secrets/vars (configurar no repo)
            export MAESTRO_TEST_EMAIL="${{ secrets.MAESTRO_TEST_EMAIL }}"
            export MAESTRO_TEST_PASSWORD="${{ secrets.MAESTRO_TEST_PASSWORD }}"
            export MAESTRO_TEST_EMAIL_B="${{ secrets.MAESTRO_TEST_EMAIL_B }}"
            export MAESTRO_TEST_PASSWORD_B="${{ secrets.MAESTRO_TEST_PASSWORD_B }}"
            export MAESTRO_TEST_TENANT_SLUG="${{ vars.MAESTRO_TEST_TENANT_SLUG }}"
            export MAESTRO_TEST_COMPANY_ID="${{ vars.MAESTRO_TEST_COMPANY_ID }}"
            export MAESTRO_TEST_WO_ID="${{ vars.MAESTRO_TEST_WO_ID }}"
            export MAESTRO_QR_ASSET_PAYLOAD="${{ vars.MAESTRO_QR_ASSET_PAYLOAD }}"
            export MAESTRO_MFA_EMAIL="${{ secrets.MAESTRO_MFA_EMAIL }}"
            export MAESTRO_MFA_PASSWORD="${{ secrets.MAESTRO_MFA_PASSWORD }}"
            export MAESTRO_MFA_SECRET="${{ secrets.MAESTRO_MFA_SECRET }}"

            mkdir -p reports
            TAG="${{ github.event.inputs.tag || matrix.tag }}"

            ## smoke roda sempre (gate basico)
            maestro test --include-tags=smoke --format=junit --output=reports/junit-smoke.xml flows/ || SMOKE_FAIL=1

            ## tag principal do job
            if [ "$TAG" != "smoke" ]; then
              maestro test --include-tags="$TAG" --format=junit --output=reports/junit-$TAG.xml flows/
            fi

            if [ "${SMOKE_FAIL:-0}" = "1" ]; then exit 1; fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-reports-api${{ matrix.api-level }}-${{ matrix.tag }}
          path: |
            reports/
            ~/.maestro/tests/**/screenshot-*.png
          retention-days: 14
